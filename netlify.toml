# Netlify configuration for MindView Virtual Classroom

[build]
  publish = "."
  functions = "netlify/functions"

# Pretty API URLs that proxy to serverless functions
[[redirects]]
  from = "/api/me"
  to = "/.netlify/functions/me"
  status = 200

[[redirects]]
  from = "/api/users"
  to = "/.netlify/functions/users"
  status = 200

# Block deployment of local-only files (Flask backend, sensitive data)
[[redirects]]
  from = "/app.py"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/users.db"
  to = "/404.html"
  status = 404
  force = true

[[redirects]]
  from = "/.secret_key"
  to = "/404.html"
  status = 404
  force = true

# Pretty admin URLs
[[redirects]]
  from = "/admin"
  to = "/admin/dashboard.html"
  status = 200

[[redirects]]
  from = "/login"
  to = "/admin/login.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
